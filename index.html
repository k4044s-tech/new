<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تقييم الأداء الوظيفي</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"
    referrerpolicy="no-referrer"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #F5F7FA;
      direction: rtl;
      color: #222;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      background: #fff;
    }

    /* ── MOE HEADER ── */
    .header-wrapper {
      position: relative;
      background-color: #012b34;
      color: white;
      padding: 0;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      margin-bottom: 35px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .top-gradient-bar {
      height: 6px;
      width: 100%;
      background: linear-gradient(90deg, #005d8f 0%, #00a896 50%, #5cc071 100%);
      -webkit-print-color-adjust: exact;
    }

    .header-content {
      padding: 12px 25px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      direction: rtl;
      gap: 16px;
    }

    .moe-logo-img {
      width: 65px;
      height: auto;
      display: block;
    }

    .vertical-separator {
      width: 1.5px;
      height: 38px;
      background-color: #1da8a0;
      opacity: 0.6;
      flex-shrink: 0;
    }

    .header-left-text {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header-left-text .line {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    .school-badge-container {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      background: #00252b;
      padding: 6px 40px;
      border-radius: 8px;
      border: 1px solid #1a4f5f;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      min-width: 240px;
      text-align: center;
      z-index: 20;
      -webkit-print-color-adjust: exact;
    }

    .school-badge-text {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
    }

    /* ── SCORE BAND ── */
    .score-band {
      background: #012b34;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 25px 15px 15px 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      -webkit-print-color-adjust: exact;
    }

    .score-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #1DA8A0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.05);
    }

    .score-num {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .score-unit {
      font-size: 10px;
      color: #B2E4E1;
    }

    .score-info {
      flex: 1;
    }

    .grade-label {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .done-count {
      font-size: 12px;
      color: #B2E4E1;
      margin-top: 3px;
    }

    .prog-wrap {
      background: rgba(255, 255, 255, 0.15);
      height: 6px;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: #1DA8A0;
      border-radius: 3px;
      transition: width 0.4s;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #E8EAED;
    }

    .tab {
      flex: 1;
      padding: 12px 4px;
      font-size: 12px;
      color: #6b7a8d;
      text-align: center;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .tab.active {
      color: #1B3A8C;
      border-bottom-color: #1DA8A0;
      font-weight: 700;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* ── TEACHER INFO ── */
    .info-card {
      background: #fff;
      border: 1px solid #E8EAED;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .info-card-title {
      font-size: 13px;
      font-weight: 700;
      color: #1B3A8C;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid #F0F0F0;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .field-row.full {
      grid-template-columns: 1fr;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 11px;
      color: #8a96a3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .field input,
    .field select {
      padding: 8px 10px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 13px;
      color: #222;
      font-family: inherit;
      background: #FAFAFA;
      direction: rtl;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: #1DA8A0;
      background: #fff;
    }

    .save-info-btn {
      width: 100%;
      padding: 13px;
      background: #1B3A8C;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    .save-info-btn:hover {
      background: #142D70;
    }

    .save-info-btn:active {
      transform: scale(0.98);
    }

    .photo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .photo-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px dashed #1DA8A0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
      background: #F0FAFA;
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ph-ico {
      font-size: 28px;
    }

    .photo-hint {
      font-size: 12px;
      color: #8a96a3;
      line-height: 1.6;
    }

    .photo-input {
      display: none;
    }

    .section-lbl {
      background: #EEF2F8;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      color: #1B3A8C;
      border-radius: 8px;
      margin-bottom: 10px;
      border-right: 4px solid #1DA8A0;
    }

    /* ── ELEMENTS ── */
    .elem-card {
      background: #fff;
      border: 1px solid #E8EAED;
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .elem-head {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .elem-head:hover {
      background: #FAFBFF;
    }

    .elem-num {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #1B3A8C;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .elem-info {
      flex: 1;
      min-width: 0;
    }

    .elem-name {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .elem-weight {
      font-size: 11px;
      color: #8a96a3;
      margin-top: 2px;
    }

    .elem-status {
      font-size: 12px;
      font-weight: 700;
      min-width: 40px;
      text-align: center;
    }

    .status-empty {
      color: #ccc;
    }

    .status-ok {
      color: #1DA8A0;
    }

    .status-warn {
      color: #E8A020;
    }

    .chevron {
      font-size: 10px;
      color: #bbb;
      transition: transform 0.2s;
      margin-right: 2px;
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    .elem-body {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid #F0F0F0;
      background: #FAFBFC;
    }

    .elem-body.open {
      display: block;
    }

    .body-label {
      font-size: 11px;
      color: #8a96a3;
      margin: 12px 0 7px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .ev-row {
      background: #fff;
      border: 1px solid #E8EAED;
      border-radius: 9px;
      padding: 10px 12px;
      margin-bottom: 7px;
    }

    .ev-row-title {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ev-link-wrap {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .ev-link-input {
      flex: 1;
      padding: 7px 10px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 12px;
      color: #1a1a2e;
      font-family: inherit;
      direction: ltr;
      text-align: left;
      background: #FAFAFA;
    }

    .ev-link-input:focus {
      outline: none;
      border-color: #1DA8A0;
      background: #fff;
    }

    .ev-link-input.valid {
      border-color: #1DA8A0;
      background: #F0FAFA;
    }

    .ev-link-input.invalid {
      border-color: #E05050;
      background: #FFF5F5;
    }

    .ev-add-btn {
      padding: 7px 14px;
      background: #1DA8A0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      font-weight: 600;
    }

    .ev-add-btn:active {
      transform: scale(0.97);
    }

    .ev-links-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ev-link-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #F0FAFA;
      border-radius: 7px;
      padding: 5px 9px;
      border: 1px solid #D0EEEC;
    }

    .ev-link-item a {
      font-size: 11px;
      color: #1B3A8C;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: ltr;
      text-align: left;
    }

    .ev-del-link {
      background: none;
      border: none;
      color: #E05050;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
    }

    .ev-required-badge {
      font-size: 10px;
      background: #FEF0E6;
      color: #C05010;
      border-radius: 8px;
      padding: 2px 7px;
      font-weight: 700;
    }

    .ev-done-badge {
      font-size: 10px;
      background: #E6F8F6;
      color: #1DA8A0;
      border-radius: 8px;
      padding: 2px 7px;
      font-weight: 700;
    }

    .val-alert {
      background: #FFF5F0;
      border: 1px solid #FBBF9A;
      border-radius: 9px;
      padding: 9px 13px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #C05010;
      display: none;
    }

    .val-alert.show {
      display: block;
    }

    .notes-input {
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      font-size: 12px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      background: #fff;
      color: #222;
      resize: none;
      font-family: inherit;
      direction: rtl;
    }

    .notes-input:focus {
      outline: none;
      border-color: #1DA8A0;
    }

    /* ── SUMMARY ── */
    .grade-hero {
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 14px;
      border: 1px solid #E8EAED;
    }

    .grade-big {
      font-size: 50px;
      font-weight: 700;
      line-height: 1;
    }

    .grade-text {
      font-size: 15px;
      font-weight: 700;
      margin-top: 6px;
    }

    .grade-sub {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.75;
    }

    .sum-table {
      background: #fff;
      border: 1px solid #E8EAED;
      border-radius: 12px;
      overflow: hidden;
    }

    .sum-row {
      border-bottom: 1px solid #F5F5F5;
      font-size: 13px;
    }

    .sum-row:last-child {
      border-bottom: none;
    }

    .sum-row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
    }

    .sum-name {
      color: #444;
      flex: 1;
      padding-left: 8px;
    }

    .sum-score {
      font-weight: 700;
      font-size: 13px;
      min-width: 40px;
      text-align: left;
    }

    .sum-ev-label {
      font-size: 11px;
      color: #1DA8A0;
      font-weight: 700;
      padding: 0 14px 4px;
    }

    .sum-links-list {
      padding: 2px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .sum-link-item {
      font-size: 11px;
      color: #1B3A8C;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .sum-link-item::before {
      content: '🔗';
      font-size: 10px;
    }

    .export-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: #1B3A8C;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .export-btn:hover {
      background: #142D70;
    }

    .export-btn:active {
      transform: scale(0.98);
    }

    .pdf-export-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: #1DA8A0;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .pdf-export-btn:hover {
      background: #178C87;
    }

    .pdf-export-btn:active {
      transform: scale(0.98);
    }

    .achieve-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .achieve-btn:hover {
      background: #1B5E20;
    }

    .achieve-btn:active {
      transform: scale(0.98);
    }

    /* ── GUIDE ── */
    .guide-block {
      background: #fff;
      border: 1px solid #E8EAED;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
    }

    .guide-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .guide-num {
      background: #1B3A8C;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .guide-ev {
      font-size: 12px;
      color: #5a6a7a;
      padding: 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .guide-ev::before {
      content: '—';
      color: #1DA8A0;
      flex-shrink: 0;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .lightbox.open {
      display: flex;
    }

    .lb-inner {
      max-width: 92vw;
      max-height: 92vh;
      position: relative;
    }

    .lb-inner img {
      max-width: 92vw;
      max-height: 88vh;
      border-radius: 10px;
      display: block;
    }

    .lb-close {
      position: absolute;
      top: -16px;
      left: -16px;
      width: 34px;
      height: 34px;
      background: #fff;
      border-radius: 50%;
      border: none;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
      font-weight: 700;
      z-index: 1;
    }

    .lb-pdf {
      background: #fff;
      border-radius: 14px;
      padding: 28px 36px;
      text-align: center;
    }

    .lb-pdf .lp1 {
      font-size: 52px;
    }

    .lb-pdf .lp2 {
      font-size: 14px;
      color: #4a5568;
      margin-top: 10px;
      word-break: break-all;
      max-width: 260px;
    }

    .lb-pdf .lp3 {
      margin-top: 16px;
      padding: 10px 24px;
      background: #1B3A8C;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }

    /* ── PRINT ── */
    @media screen {
      #print-report {
        display: none;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 10mm;
      }

      body {
        background: #fff;
      }

      .app,
      .lightbox,
      .tabs,
      .save-info-btn,
      .achieve-btn {
        display: none !important;
      }

      #print-report {
        display: block !important;
        width: 100%;
        max-width: none;
        margin: 0;
      }

      .rpt-qr-cell canvas {
        display: block !important;
      }

      .rpt-qr-cell {
        flex-wrap: nowrap !important;
      }

      tr {
        page-break-inside: avoid;
      }
    }

    #print-report {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      direction: rtl;
      color: #1a1a2e;
      max-width: 210mm;
      margin: 0 auto;
    }

    .rpt-header {
      background: #012b34;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      direction: rtl;
      -webkit-print-color-adjust: exact;
    }

    .rpt-ministry {
      font-size: 11px;
      color: #B2E4E1;
      margin-bottom: 3px;
    }

    .rpt-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    .rpt-subtitle {
      font-size: 13px;
      color: #B2E4E1;
      margin-top: 3px;
    }

    .rpt-logo-box {
      width: 70px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rpt-logo-box img {
      width: 100%;
      object-fit: contain;
    }

    .rpt-teacher-box {
      background: #F8FFFE;
      border-bottom: 3px solid #1DA8A0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .rpt-teacher-photo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #1DA8A0;
      overflow: hidden;
      flex-shrink: 0;
      background: #E8F9F8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .rpt-teacher-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .rpt-teacher-info {
      flex: 1;
    }

    .rpt-teacher-name {
      font-size: 18px;
      font-weight: 700;
      color: #1B3A8C;
      margin-bottom: 4px;
    }

    .rpt-teacher-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px 15px;
    }

    .rpt-field {
      font-size: 10px;
      color: #5a6a7a;
      white-space: nowrap;
    }

    .rpt-field span {
      font-weight: 700;
      color: #1a1a2e;
    }

    .rpt-score-summary {
      text-align: center;
      border-right: 2px solid #D0EEEC;
      padding-right: 15px;
      flex-shrink: 0;
    }

    .rpt-score-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #1DA8A0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 4px auto 0;
    }

    .rpt-score-val {
      font-size: 14px;
      font-weight: 700;
      color: #1B3A8C;
      line-height: 1;
    }

    .rpt-score-label {
      font-size: 8px;
      color: #1DA8A0;
    }

    .rpt-section-head {
      background: #EEF2F8;
      color: #1B3A8C;
      padding: 8px 24px;
      font-size: 11px;
      font-weight: 700;
      border-right: 4px solid #1DA8A0;
      margin-top: 10px;
    }

    .rpt-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 5px;
    }

    .rpt-table thead th {
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      color: #1B3A8C;
      text-align: right;
      border-bottom: 2px solid #1DA8A0;
    }

    .rpt-table tbody td {
      padding: 8px 12px;
      font-size: 11px;
      color: #1a1a2e;
      border-bottom: 1px solid #F0F0F0;
    }

    .rpt-qr-cell {
      display: flex;
      flex-wrap: nowrap;
      gap: 10px;
      align-items: flex-start;
      overflow: visible;
    }

    .rpt-qr-item {
      text-align: center;
      flex-shrink: 0;
      width: 82px;
    }

    .rpt-qr-item .qr-canvas-wrap {
      width: 80px;
      height: 80px;
      border: 1px solid #D0EEEC;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    .rpt-qr-item .qr-label {
      margin-top: 3px;
      word-break: break-all;
      max-width: 80px;
      line-height: 1.3;
    }

    .rpt-note {
      font-size: 11px;
      color: #718096;
      font-style: italic;
    }

    .rpt-sig-area {
      padding: 15px 24px;
      display: flex;
      gap: 15px;
      page-break-inside: avoid;
    }

    .rpt-sig-box {
      flex: 1;
      border: 1px solid #1DA8A0;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      background: #fff;
    }

    .rpt-sig-title {
      font-size: 11px;
      font-weight: 700;
      color: #1B3A8C;
      margin-bottom: 15px;
    }

    .rpt-sig-line {
      font-size: 10px;
      color: #4a5568;
      border-top: 1px dashed #B2E4E1;
      padding-top: 6px;
    }

    .rpt-footer {
      background: linear-gradient(90deg, #1B3A8C, #1DA8A0);
      padding: 9px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      direction: rtl;
    }

    .rpt-footer-text {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .rpt-footer-date {
      font-size: 11px;
      color: #D0EEF5;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-switch .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #0F4A45;
      transition: .4s;
      border-radius: 22px;
      border: 1px solid #1DA8A0;
    }
    .toggle-switch .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    .toggle-switch input:checked + .slider {
      background-color: #1DA8A0;
    }
    .toggle-switch input:checked + .slider:before {
      transform: translateX(18px);
    }

    @media (max-width:480px) {
      .app {
        max-width: 100%;
      }
    }
  </style>
</head>

    function buildRatingForm() {
      // Get the job title directly from the dropdown, fallback to 'معلم'
      var jobSelect = document.getElementById('f-jobtitle');
      var role = (jobSelect && jobSelect.value) ? jobSelect.value : 'معلم';
      var elems = ELEMENTS_BY_ROLE[role] || ELEMENTS_BY_ROLE['معلم'];
      
      var tName = teacherInfo.name || 'اسم الموظف';
      var html = '<div id="rating-print-area" style="padding:16px; direction:rtl; font-family:\'Tajawal\', sans-serif;">';
      
      // Top section with title and score
      html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">';
      html += '  <div style="display:flex; align-items:center; gap:15px;">';
      var displayRole = (role === 'موجه صحي') ? 'معلم مسند له توجيه صحي' : role;
      html += '    <h3 style="margin:0; color:#0F4A45;">نموذج تقييم أداء ' + displayRole + '</h3>';
      html += '    <div style="background:#0F4A45; color:#fff; padding:5px 15px; border-radius:20px; font-size:14px; font-weight:bold;">' + tName + '</div>';
      html += '  </div>';
      html += '  <div style="display:flex; align-items:center; gap:15px;">';
      html += '    <button id="rating-print-btn" onclick="printRatingFormOnly()" style="background:#1DA8A0; color:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:14px; display:flex; align-items:center; gap:5px; font-family:inherit;"><span style="font-size:16px;">🖨️</span> طباعة النموذج</button>';
      html += '    <div style="background:#E0F5F4; border:2px solid #1DA8A0; border-radius:50px; padding:5px 15px; font-weight:bold; color:#0F4A45; font-size:16px;">المجموع: <span id="rating-total-score">0</span> من 100 <span id="rating-grade-text" style="font-size:12px; font-weight:normal; margin-right:5px;"></span></div>';
      html += '  </div>';
      html += '</div>';

      html += '<table style="width:100%; border-collapse:collapse; background:#fff; font-family:\'Tajawal\', sans-serif; font-size:14px; text-align:center;">';
      
      // Thead
      html += '<thead style="color:#fff;">';
      html += '<tr>';
      html += '<th colspan="7" style="background:#00a396; padding:12px; font-size:18px;">نموذج تقييم أداء ' + displayRole + '</th>';
      html += '</tr>';
      html += '<tr>';
      html += '<th rowspan="2" style="background:#0F4A45; border:1px solid #fff; padding:10px; width:50%;">عناصر التقييم</th>';
      html += '<th rowspan="2" style="background:#0F4A45; border:1px solid #fff; padding:10px; width:15%;">الوزن النسبي</th>';
      html += '<th colspan="5" style="background:#0F4A45; border:1px solid #fff; padding:5px; width:35%;">سلم التقدير</th>';
      html += '</tr>';
      html += '<tr>';
      for (var i = 1; i <= 5; i++) {
        html += '<th style="background:#5DBDB6; border:1px solid #fff; padding:5px;">' + i + '</th>';
      }
      html += '</tr>';
      html += '</thead>';

      html += '<tbody>';
      
      for (var i = 0; i < elems.length; i++) {
        var el = elems[i];
        
        // Add special separators for certain roles
        if (role === 'رائد نشاط' && i === 5) {
            html += '<tr><td colspan="7" style="background:#0F4A45; color:#fff; font-weight:bold; text-align:right; padding:8px 15px;">معيار خاص لنشاط الطلابي</td></tr>';
        }
        if (role === 'موجه صحي' && i === 11) {
            html += '<tr><td colspan="7" style="background:#0F4A45; color:#fff; font-weight:bold; text-align:right; padding:8px 15px;">معيار خاص للموجه الصحي</td></tr>';
        }
        
        // Background colors mimicking the ministerial form
        var bgElements = '#E9F7F5';
        var bgWeight = '#DDECE9';
        var bgScale = '#71C7BE';
        
        html += '<tr>';
        
        // Element Name
        html += '<td style="background:' + bgElements + '; border:1px solid #fff; padding:10px; text-align:right; color:#0F4A45; font-weight:bold;">' + el.name + '</td>';
        
        // Weight
        html += '<td style="background:' + bgWeight + '; border:1px solid #fff; padding:10px; font-weight:bold; color:#0F4A45;">%' + el.weight + '</td>';
        
        // Rating Scale 1-5
        for (var score = 1; score <= 5; score++) {
          var isChecked = (ratings[el.id] === score);
          var checkHtml = isChecked ? '<span style="color:#fff; font-size:18px; font-weight:bold; text-shadow:1px 1px 2px rgba(0,0,0,0.3);">✓</span>' : '';
          
          html += '<td style="background:' + bgScale + '; border:1px solid #fff; padding:10px; cursor:pointer;" onclick="setRating(' + el.id + ', ' + score + ')">';
          html += checkHtml;
          html += '</td>';
        }
        
        html += '</tr>';
      }
      
      html += '</tbody>';
      
      // Tfoot
      html += '<tfoot>';
      html += '<tr><td colspan="7" style="background:#0F4A45; color:#fff; font-weight:bold; padding:12px; font-size:16px;">التقدير العام للأداء</td></tr>';
      html += '</tfoot>';
      
      html += '</table>';
      html += '</div>';

      document.getElementById('panel-rating').innerHTML = html;
      calcRatingTotal();

    function setRating(elId, score) {
      if (ratings[elId] === score) {
        delete ratings[elId];
      } else {
        ratings[elId] = score;
      }
      buildRatingForm();
    }

    function calcRatingTotal() {
      var jobSelect = document.getElementById('f-jobtitle');
      var role = (jobSelect && jobSelect.value) ? jobSelect.value : 'معلم';
      var elems = ELEMENTS_BY_ROLE[role] || ELEMENTS_BY_ROLE['معلم'];
      var total = 0;
      var count = 0;
      for (var i = 0; i < elems.length; i++) {
        var el = elems[i];
        if (ratings[el.id]) {
          var points = ratings[el.id] * (el.weight / 5);
          total += points;
          count++;
        }
      }
      
      var totalEl = document.getElementById('rating-total-score');
      if (totalEl) totalEl.textContent = total;
      
      var gradeEl = document.getElementById('rating-grade-text');
      if (gradeEl) {
          var g = '';
          if (count === 0) g = 'لم يبدأ';
          else if (total >= 90) g = '(ممتاز)';
          else if (total >= 80) g = '(جيد جداً)';
          else if (total >= 70) g = '(جيد)';
          else if (total >= 60) g = '(مُرضي)';
          else g = '(غير مُرضي)';
          gradeEl.textContent = g;
      }
    }

    function updateGenderUI() {
      var g = document.getElementById('f-gender').value;
      var nameInput = document.getElementById('f-name');
      var nameLabel = document.querySelector('.field label[for="f-name"]');
      if (g === 'أنثى') {
        if (nameInput) nameInput.placeholder = 'اسم المعلمة';
        // update label if needed
      } else if (g === 'ذكر') {
        if (nameInput) nameInput.placeholder = 'اسم المعلم';
      } else {
        if (nameInput) nameInput.placeholder = 'اسم المعلم / المعلمة';
      }
    }

    function toggleEvalVisibility() {
      var job = document.getElementById('f-jobtitle') ? document.getElementById('f-jobtitle').value : '';
      if (!job) return;

      var evalTab = document.querySelectorAll('.tab')[1];
      var noticeId = 'role-notice';

      // Remove old notice
      var oldNotice = document.getElementById(noticeId);
      if (oldNotice) oldNotice.remove();

      // Update elements for selected role
      updateElementsByRole(job || 'معلم');

      // Always enable eval tab - all roles have evaluation
      evalTab.style.opacity = '1';
      evalTab.style.pointerEvents = 'auto';

      // Show role badge below tabs
      var div = document.createElement('div');
      div.id = noticeId;
      var g = document.getElementById('f-gender') ? document.getElementById('f-gender').value : '';
      var isFemale = (g === 'أنثى');
      var roleNames = {
        'معلم': '📚 نموذج تقييم أداء ' + (isFemale ? 'معلمة' : 'معلم'),
        'مدير': '🏫 نموذج تقييم أداء ' + (isFemale ? 'مديرة المدرسة' : 'مدير المدرسة'),
        'وكيل': '📋 نموذج تقييم أداء ' + (isFemale ? 'وكيلة المدرسة' : 'وكيل المدرسة'),
        'موجه طلابي': '🎯 نموذج تقييم أداء ' + (isFemale ? 'الموجهة الطلابية' : 'الموجه الطلابي'),
        'رائد نشاط': '⭐ نموذج تقييم أداء ' + (isFemale ? 'رائدة النشاط الطلابي' : 'رائد النشاط الطلابي'),
        'محضر مختبر': '🔬 نموذج تقييم أداء ' + (isFemale ? 'محضرة المختبر' : 'محضر المختبر'),
        'مساعد اداري': '🗂️ نموذج تقييم أداء ' + (isFemale ? 'المساعدة الإدارية' : 'المساعد الإداري')
      };
      div.style.cssText = 'background:linear-gradient(135deg,#E0F5F4,#EEF8F8);border:1.5px solid #1DA8A0;border-radius:10px;padding:10px 16px;margin:10px 16px 0;font-size:13px;font-weight:700;color:#0F4A45;text-align:center';
      div.textContent = roleNames[job] || job;
      var tabs = document.querySelector('.tabs');
      tabs.parentNode.insertBefore(div, tabs.nextSibling);
    }

    function getEl(id) { for (var i = 0; i < ELEMENTS.length; i++) if (ELEMENTS[i].id === id) return ELEMENTS[i]; return null; }

    /* ── PHOTO ── */
    function loadPhoto(input) {
      var file = input.files[0]; if (!file) return;
      var r = new FileReader();
      r.onload = function (e) {
        teacherPhoto = e.target.result;
        var img = document.getElementById('photo-preview');
        img.src = teacherPhoto; img.style.display = 'block';
        document.getElementById('photo-icon').style.display = 'none';
      };
      r.readAsDataURL(file);
    }

    /* ── BUILD ELEMENTS ── */
    function buildElements() {
      var html = '<div class="section-lbl">عناصر التقييم — أضف رابطاً لكل شاهد (شاهد واحد على الأقل لكل عنصر)</div>';
      for (var i = 0; i < ELEMENTS.length; i++) {
        var el = ELEMENTS[i];
        var evHtml = '';
        for (var j = 0; j < el.evidence.length; j++) {
          evHtml += '<div class="ev-row" id="evrow-' + el.id + '-' + j + '">'
            + '<div class="ev-row-title">'
            + '<span class="ev-ico">🔗</span>'
            + el.evidence[j]
            + ' <span id="evbadge-' + el.id + '-' + j + '" class="ev-required-badge">مطلوب</span>'
            + '</div>'
            + '<div class="ev-link-wrap">'
            + '<input class="ev-link-input" type="url" id="evlink-' + el.id + '-' + j + '" placeholder="https://drive.google.com/..." oninput="validateUrl(this)" onkeydown="linkKeyDown(event,' + el.id + ',' + j + ')">'
            + '<button class="ev-add-btn" onclick="addLink(' + el.id + ',' + j + ')">إضافة</button>'
            + '</div>'
            + '<div class="ev-links-list" id="evlist-' + el.id + '-' + j + '"></div>'
            + '</div>';
        }
        html += '<div class="elem-card">'
          + '<div class="elem-head" onclick="toggleCard(' + el.id + ')">'
          + '<div class="elem-num">' + el.id + '</div>'
          + '<div class="elem-info"><div class="elem-name">' + el.name + '</div><div class="elem-weight">الوزن: ' + el.weight + '%</div></div>'
          + '<div class="elem-status status-empty" id="elstatus-' + el.id + '">—</div>'
          + '<div class="chevron" id="chev-' + el.id + '">▼</div>'
          + '</div>'
          + '<div class="elem-body" id="body-' + el.id + '">'
          + (SHOW_ELEMENT_DESCRIPTIONS && el.desc ? '<div class="elem-desc">' + el.desc + '</div>' : '')
          + '<div class="body-label">الشواهد — أدخل رابط لكل شاهد (شاهد واحد على الأقل مطلوب)</div>'
          + '<div id="val-alert-' + el.id + '" class="val-alert">⚠️ يجب إضافة رابط لشاهد واحد على الأقل لإكمال هذا العنصر.</div>'
          + evHtml
          + '<div class="body-label" style="margin-top:15px; color:#1B3A8C">وصف إنجاز المعلم للعنصر — اصف تطبيقك لهذا العنصر من خلال الشواهد المرفقة</div>'
          + '<textarea class="notes-input" rows="3" placeholder="اكتب هنا وصفاً مختصراً لكيفية تحقيقك لهذا العنصر وتطبيقك له في الميدان التربوي..." id="notes-' + el.id + '"></textarea>'
          + '</div></div>';
      }
      document.getElementById('panel-elements').innerHTML = '<div style="padding:12px">' + html + '</div>';
    }

    /* ── URL VALIDATION ── */
    function validateUrl(inp) {
      var v = inp.value.trim();
      if (!v) { inp.className = 'ev-link-input'; return false; }
      try { new URL(v); inp.classList.add('valid'); inp.classList.remove('invalid'); return true; }
      catch (e) { inp.classList.add('invalid'); inp.classList.remove('valid'); return false; }
    }

    function linkKeyDown(e, elId, evIdx) {
      if (e.key === 'Enter') { e.preventDefault(); addLink(elId, evIdx); }
    }

    /* ── ADD LINK ── */
    function addLink(elId, evIdx) {
      var inp = document.getElementById('evlink-' + elId + '-' + evIdx);
      var url = inp.value.trim();
      if (!url) { alert('الرجاء إدخال رابط أولاً'); return; }
      try { new URL(url); }
      catch (e) { alert('الرابط غير صحيح. تأكد أنه يبدأ بـ https://'); return; }
      if (!links[elId]) links[elId] = {};
      if (!links[elId][evIdx]) links[elId][evIdx] = [];
      /* prevent duplicate */
      for (var i = 0; i < links[elId][evIdx].length; i++) {
        if (links[elId][evIdx][i] === url) { alert('هذا الرابط مضاف مسبقاً'); return; }
      }
      links[elId][evIdx].push(url);
      inp.value = '';
      inp.className = 'ev-link-input';
      renderLinkList(elId, evIdx);
      updateElementStatus(elId);
      updateTotal();
    }

    /* ── RENDER LINK LIST ── */
    function renderLinkList(elId, evIdx) {
      var list = links[elId] && links[elId][evIdx] ? links[elId][evIdx] : [];
      var badge = document.getElementById('evbadge-' + elId + '-' + evIdx);
      var container = document.getElementById('evlist-' + elId + '-' + evIdx);
      if (!container) return;

      if (list.length > 0) {
        badge.textContent = '✓ ' + list.length + ' رابط';
        badge.className = 'ev-done-badge';
      } else {
        badge.textContent = 'مطلوب';
        badge.className = 'ev-required-badge';
      }

      var h = '';
      for (var i = 0; i < list.length; i++) {
        var shortUrl = list[i].length > 45 ? list[i].substring(0, 45) + '…' : list[i];
        h += '<div class="ev-link-item">'
          + '<a href="' + list[i] + '" target="_blank" title="' + list[i] + '">' + shortUrl + '</a>'
          + '<button class="ev-del-link" onclick="delLink(' + elId + ',' + evIdx + ',' + i + ')" title="حذف">✕</button>'
          + '</div>';
      }
      container.innerHTML = h;
    }

    /* ── DELETE LINK ── */
    function delLink(elId, evIdx, idx) {
      links[elId][evIdx].splice(idx, 1);
      renderLinkList(elId, evIdx);
      updateElementStatus(elId);
      updateTotal();
    }

    /* ── ELEMENT HAS AT LEAST 1 LINK ── */
    function elementHasLink(elId) {
      if (!links[elId]) return false;
      var el = getEl(elId);
      for (var j = 0; j < el.evidence.length; j++) {
        if (links[elId][j] && links[elId][j].length > 0) return true;
      }
      return false;
    }

    function countElementLinks(elId) {
      var count = 0;
      if (!links[elId]) return 0;
      var el = getEl(elId);
      for (var j = 0; j < el.evidence.length; j++) {
        if (links[elId][j]) count += links[elId][j].length;
      }
      return count;
    }

      if (count > 0) {
        badge.textContent = count + ' 🔗';
        badge.className = 'elem-status status-ok';
      } else {
        badge.textContent = '—';

    /* ── UPDATE TOTAL (based on elements with at least 1 link) ── */

      var total = 0, done = 0;
      ELEMENTS.forEach(function (el) {
        if (elementHasLink(el.id)) { total += el.weight; done++; }

    /* ══════════════════════════════════════════
       ملف الإنجاز الوظيفي - بنفس تصميم الوزارة
    ══════════════════════════════════════════ */
    function printAchievementFile() {
      var inf = teacherInfo;
      var now = new Date();
      var dateStr = now.toLocaleDateString('ar-SA-u-ca-islamic', { year: 'numeric', month: 'long', day: 'numeric' });
      var year = inf.year || '١٤٤٦هـ';
      var term = inf.term || 'الفصل الثاني';
      var school = inf.school || '...................................................';
      var dept = inf.dept || '.....................';
      var gender = inf.gender || '';
      var namePrefix = gender === 'أنثى' ? 'أ/' : gender === 'ذكر' ? 'أ/' : 'أ/';
      var nameTitle = gender === 'أنثى' ? 'اسم المعلمة:' : gender === 'ذكر' ? 'اسم المعلم:' : 'اسم المعلم/ة:';
      var name = inf.name || (namePrefix + ' ...........................');

      /* ── COLORS ── */
      var TEAL = '#1DA8A0'; var NAVY = '#1B3A8C'; var DARK = '#0F2560';

      /* ── HEADER (repeated) ── */
      function pageHeader() {
        return getGlobalHeader(inf);
      }

      /* ── SECTION TITLE (like PDF quotation style) ── */
      function sectionCard(title) {
        return '<div style="margin:30px 24px;border:2px solid ' + TEAL + ';border-radius:12px;padding:30px;text-align:center;position:relative">'
          + '<div style="position:absolute;top:-18px;right:20px;font-size:42px;color:' + TEAL + ';font-weight:900;line-height:1">"</div>'
          + '<div style="font-size:32px;font-weight:700;color:' + TEAL + ';line-height:1.4">' + title + '</div>'
          + '<div style="position:absolute;bottom:-18px;left:20px;font-size:42px;color:' + TEAL + ';font-weight:900;line-height:1;transform:rotate(180deg)">"</div>'
          + '</div>';
      }

      /* ── SECTION HEADING ── */
      function secHead(title) {
        return '<div style="display:flex;align-items:center;gap:0;margin:20px 24px 10px">'
          + '<div style="width:6px;height:40px;background:' + TEAL + ';border-radius:3px;margin-left:10px"></div>'
          + '<div style="font-size:18px;font-weight:700;color:' + DARK + '">' + title + '</div>'
          + '<div style="flex:1;height:3px;background:' + TEAL + ';margin-right:12px;margin-top:2px;opacity:0.5"></div>'
          + '</div>';
      }

      /* ── TABLE header ── */
      function tableHead(elName, weight) {
        return '<div style="background:' + TEAL + ';padding:14px 20px;margin:0 24px;border-radius:8px 8px 0 0">'
          + '<div style="font-size:16px;font-weight:700;color:#fff">' + elName + ' (' + weight + '%٪)</div>'
          + '</div>';
      }

      /* ── CHECK TABLE for evidence ── */
      function checkTable(elId, items) {
        var rows = items.map(function (item, j) {
          var hasLink = links[elId] && links[elId][j] && links[elId][j].length > 0;
          var firstUrl = hasLink ? links[elId][j][0] : '';
          var qrId = 'table-qr-ach-' + elId + '-' + j;
          return '<tr>'
            + '<td style="padding:10px 14px;font-size:13px;color:#222;border-bottom:1px solid #E0F5F4;width:40%">• ' + item + '</td>'
            + '<td style="text-align:center;border-bottom:1px solid #E0F5F4;border-right:1px solid #E0F5F4;width:15%;font-size:18px">'
            + (hasLink ? '<span style="color:#1DA8A0">✅</span>' : '') + '</td>'

        + '          var qDiv=document.createElement("div");\n'

        + '        });\n'
        + '      });\n'
        + '    }\n'
